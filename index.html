<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Balance · Батуми</title>
<meta name="theme-color" content="#FFD600"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Manrope','Segoe UI',sans-serif;background:#FFFDF0;color:#1A1500;min-height:100vh;}
button,a,input,select{font-family:inherit;}
.header{position:sticky;top:0;z-index:50;background:#FFD600;box-shadow:0 2px 12px rgba(0,0,0,.12);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;border-radius:10px;background:#1A1500;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#FFD600;}
.logo-title{font-size:16px;font-weight:900;letter-spacing:-.5px;line-height:1;}
.logo-sub{font-size:9px;color:rgba(0,0,0,.45);letter-spacing:.8px;text-transform:uppercase;}
.nav{display:flex;gap:2px;align-items:center;flex-wrap:wrap;}
.nav-btn{padding:6px 10px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:transparent;color:#1A1500;position:relative;}
.nav-btn.active{background:rgba(0,0,0,.12);}
.nav-badge{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:#E53935;}
.rest-link{margin-left:6px;padding:6px 12px;border-radius:8px;border:2px solid #1A1500;background:transparent;color:#1A1500;font-size:12px;font-weight:800;text-decoration:none;}
.main{padding:20px 16px;max-width:900px;margin:0 auto;}
.h1{font-size:22px;font-weight:900;margin-bottom:16px;letter-spacing:-.5px;}
.h2{font-size:13px;font-weight:800;margin-bottom:12px;color:#9A8E60;text-transform:uppercase;letter-spacing:.5px;}
.card{background:#fff;border:2px solid #F0E8C0;border-radius:14px;padding:16px;box-shadow:2px 2px 0 #F0E8C0;margin-bottom:10px;}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:#fff;border:2px solid #F0E8C0;border-radius:14px;padding:16px;box-shadow:2px 2px 0 #F0E8C0;}
.stat-icon{font-size:22px;}
.stat-val{font-size:26px;font-weight:900;line-height:1.1;margin-top:6px;}
.stat-label{font-size:11px;color:#9A8E60;margin-top:4px;font-weight:600;}
.btn{padding:9px 16px;border-radius:10px;border:2px solid #1A1500;background:#FFD600;color:#1A1500;cursor:pointer;font-size:13px;font-weight:800;box-shadow:3px 3px 0 #1A1500;}
.btn:disabled{background:#e0e0e0;color:#9A8E60;border-color:#ccc;box-shadow:none;cursor:not-allowed;}
.btn-sm{padding:6px 12px;border-radius:8px;border:1.5px solid #F0E8C0;background:#fff;color:#1A1500;cursor:pointer;font-size:12px;font-weight:700;}
.btn-red{border-color:#E53935;background:#fff5f5;color:#E53935;}
.btn-green{border-color:#2E7D32;background:#f1f8f1;color:#2E7D32;}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;}
.tag-yellow{background:#FFD600;color:#1A1500;}
.courier-avatar{width:44px;height:44px;border-radius:50%;background:#FFD600;border:3px solid #1A1500;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#1A1500;flex-shrink:0;}
.rest-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.flash{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:#1A1500;color:#FFD600;padding:10px 24px;border-radius:12px;font-weight:800;font-size:14px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.2);white-space:nowrap;pointer-events:none;}
.alert-new{background:#FFD600;border:2px solid #1A1500;border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:3px 3px 0 #1A1500;}
/* Modal */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border:3px solid #1A1500;border-radius:20px;padding:24px;width:100%;max-width:420px;box-shadow:6px 6px 0 #1A1500;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:900;}
.modal-close{background:#FFD600;border:2px solid #1A1500;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;}
.field{margin-bottom:14px;}
.field label{font-size:11px;color:#9A8E60;font-weight:700;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.field input,.field select{width:100%;padding:11px 12px;border-radius:10px;background:#FFFDF0;border:2px solid #F0E8C0;color:#1A1500;font-size:14px;outline:none;font-weight:600;}
.assign-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:2px solid #F0E8C0;background:transparent;cursor:pointer;text-align:left;width:100%;margin-bottom:8px;font-size:14px;font-weight:700;}
.call-btn{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:8px;background:#2E7D32;color:#fff;font-size:14px;font-weight:800;text-decoration:none;}
.status-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.status-btn{padding:4px 10px;border-radius:8px;border:1.5px solid #F0E8C0;background:transparent;color:#9A8E60;cursor:pointer;font-size:11px;font-weight:700;}
.rest-tag{display:inline-flex;align-items:center;gap:7px;border-radius:8px;padding:5px 10px;margin:3px;font-size:12px;font-weight:800;}
/* Restaurant mode */
.rest-select-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:2px solid #F0E8C0;background:#fff;cursor:pointer;text-align:left;width:100%;margin-bottom:8px;font-size:15px;font-weight:800;box-shadow:2px 2px 0 #F0E8C0;}
.rest-select-btn.selected{box-shadow:2px 2px 0 var(--rc);}
.big-btn{padding:15px 20px;border-radius:12px;border:3px solid #1A1500;background:#FFD600;color:#1A1500;cursor:pointer;font-size:16px;font-weight:900;width:100%;box-shadow:4px 4px 0 #1A1500;}
.big-btn:disabled{background:#e0e0e0;color:#9A8E60;border-color:#ccc;box-shadow:none;cursor:not-allowed;}
.divider{height:2px;background:#F0E8C0;border-radius:2px;margin:16px 0;}
.empty{text-align:center;padding:50px 0;color:#9A8E60;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.flex{display:flex;align-items:center;gap:12px;}
.flex-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.from-rest-badge{display:inline-block;margin-bottom:10px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;background:#FFD600;color:#1A1500;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const Y="#FFD600",TEXT="#1A1500",MUTED="#9A8E60",RED="#E53935",GREEN="#2E7D32",BLUE="#1565C0";
const STATUSES={free:{label:"Свободен",color:GREEN},delivering:{label:"В доставке",color:"#E65100"},busy:{label:"Занят",color:RED}};
const ORDER_S={new:{label:"Новый",color:"#7B1FA2"},accepted:{label:"Принят",color:BLUE},delivering:{label:"В пути",color:"#E65100"},done:{label:"Доставлен",color:GREEN},cancelled:{label:"Отменён",color:RED}};
const REST_COLORS=["#E53935","#7B1FA2","#1565C0","#2E7D32","#E65100","#00838F","#AD1457","#558B2F","#4527A0","#283593"];
const DEFAULT_RESTS=[
  {id:1,name:"Manufactory",cuisine:"",address:"",phone:"",color:"#E53935",active:true},
  {id:2,name:"Sheffpoint",cuisine:"",address:"",phone:"",color:"#7B1FA2",active:true},
  {id:3,name:"Cheese Lovers",cuisine:"",address:"",phone:"",color:"#1565C0",active:true},
  {id:4,name:"BBSh",cuisine:"",address:"",phone:"",color:"#2E7D32",active:true},
  {id:5,name:"MANUFACTORY",cuisine:"",address:"",phone:"",color:"#E65100",active:true},
  {id:6,name:"SHEFFPOINT",cuisine:"",address:"",phone:"",color:"#00838F",active:true},
  {id:7,name:"CHEESE LOVERS",cuisine:"",address:"",phone:"",color:"#AD1457",active:true},
];
const DEFAULT_COURIERS=[
  {id:1,name:"Zhenya",phone:"",avatar:"Z",status:"free",assignments:[]},
  {id:2,name:"Bachi",phone:"",avatar:"B",status:"free",assignments:[]},
];

function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function gid(){return Date.now()+Math.random();}
function tnow(){return new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});}

let state={
  route:window.location.hash||"#courier",
  tab:"dashboard",
  orders:load("bal_orders",[]),
  restaurants:load("bal_rests",DEFAULT_RESTS),
  couriers:load("bal_couriers",DEFAULT_COURIERS),
  flash:null, flashTimer:null,
  modal:null, // {type, data}
  prevNew:0,
  // restaurant mode
  selRest:null,
  restForm:{clientPhone:"",clientAddress:"",note:""},
  sent:false,
};

function setState(patch){Object.assign(state,typeof patch==="function"?patch(state):patch);render();}
function persist(){save("bal_orders",state.orders);save("bal_rests",state.restaurants);save("bal_couriers",state.couriers);}

function flash(msg){
  if(state.flashTimer)clearTimeout(state.flashTimer);
  const t=setTimeout(()=>setState({flash:null,flashTimer:null}),3000);
  setState({flash:msg,flashTimer:t});
}

function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.2,.4].forEach(d=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(.5,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.18);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.18);
    });
  }catch(e){}
}

// Poll for new orders (restaurant → courier sync)
setInterval(()=>{
  const saved=load("bal_orders",[]);
  if(JSON.stringify(saved)!==JSON.stringify(state.orders)){
    const newN=saved.filter(o=>o.status==="new").length;
    if(newN>state.prevNew){playBeep();flash("🔔 Новый заказ от ресторана!");}
    setState({orders:saved,prevNew:newN});
  }
},1500);

window.addEventListener("hashchange",()=>{
  setState({route:window.location.hash||"#courier",selRest:null,restForm:{clientPhone:"",clientAddress:"",note:""},sent:false});
});

// ── ACTIONS ────────────────────────────────────────────────────────────────
const A={
  setTab(tab){setState({tab});},
  addOrder(data){
    const o={id:gid(),...data,status:"new",createdAt:tnow()};
    setState(s=>({orders:[o,...s.orders]}));persist();
  },
  setOrderStatus(id,status){setState(s=>({orders:s.orders.map(o=>o.id===id?{...o,status}:o)}));persist();},
  delOrder(id){setState(s=>({orders:s.orders.filter(o=>o.id!==id)}));persist();},
  updOrder(id,f,v){setState(s=>({orders:s.orders.map(o=>o.id===id?{...o,[f]:v}:o)}));persist();},
  addRest(r){
    const rests=state.restaurants;
    const active=rests.filter(x=>x.active);
    if(active.length>=10){flash("Максимум 10 ресторанов!");return;}
    setState(s=>({restaurants:[...s.restaurants,{...r,id:gid(),color:REST_COLORS[s.restaurants.length%REST_COLORS.length],active:true}]}));persist();
  },
  removeRest(id){
    setState(s=>({
      restaurants:s.restaurants.filter(r=>r.id!==id),
      couriers:s.couriers.map(c=>{const a=c.assignments.filter(x=>x.restId!==id);return{...c,assignments:a,status:a.length===0?"free":c.status};}),
    }));persist();flash("Ресторан удалён");
  },
  updateRest(id,fields){setState(s=>({restaurants:s.restaurants.map(r=>r.id===id?{...r,...fields}:r)}));persist();},
  addCourier(c){
    const av=c.name.trim().split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
    setState(s=>({couriers:[...s.couriers,{...c,id:gid(),avatar:av,status:"free",assignments:[]}]}));persist();
  },
  removeCourier(id){setState(s=>({couriers:s.couriers.filter(c=>c.id!==id)}));persist();},
  toggleAssign(courierId,restId){
    setState(s=>({couriers:s.couriers.map(c=>{
      if(c.id!==courierId)return c;
      const already=c.assignments.find(a=>a.restId===restId);
      const asgn=already?c.assignments.filter(a=>a.restId!==restId):[...c.assignments,{restId,since:tnow()}];
      return{...c,assignments:asgn,status:asgn.length===0?"free":asgn.length>=2?"busy":"delivering"};
    })}));persist();
  },
  setCourierStatus(id,status){setState(s=>({couriers:s.couriers.map(c=>c.id===id?{...c,status}:c)}));persist();},
  openModal(type,data={}){setState({modal:{type,data}});},
  closeModal(){setState({modal:null});},
};

// ── RENDER ─────────────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="href")el.href=v;
    else if(k==="disabled")el.disabled=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const s=state;
  if(s.route==="#restaurant"){app.appendChild(renderRestaurantMode());return;}
  app.appendChild(renderCourierMode());
  if(s.flash){const f=document.createElement("div");f.className="flash";f.textContent=s.flash;app.appendChild(f);}
  if(s.modal)app.appendChild(renderModal());
}

// ── COURIER MODE ───────────────────────────────────────────────────────────
function renderCourierMode(){
  const s=state;
  const activeRests=s.restaurants.filter(r=>r.active);
  const activeOrders=s.orders.filter(o=>o.status!=="done"&&o.status!=="cancelled");
  const newOrders=s.orders.filter(o=>o.status==="new");
  const TABS=[
    {key:"dashboard",label:"Обзор"},
    {key:"orders",label:`Заказы${activeOrders.length?` (${activeOrders.length})`:""}`,badge:newOrders.length},
    {key:"couriers",label:"Курьеры"},
    {key:"restaurants",label:"Рестораны"},
  ];
  const wrap=h("div",{});

  // Header
  const header=h("div",{className:"header"},
    h("div",{className:"logo"},
      h("div",{className:"logo-icon"},"B"),
      h("div",{},h("div",{className:"logo-title"},"Balance"),h("div",{className:"logo-sub"},"Батуми · Доставка"))
    ),
    h("div",{className:"nav"},
      ...TABS.map(t=>{
        const btn=h("button",{className:"nav-btn"+(s.tab===t.key?" active":""),onClick:()=>A.setTab(t.key)},t.label);
        if(t.badge>0){const dot=document.createElement("span");dot.className="nav-badge";btn.appendChild(dot);}
        return btn;
      }),
      h("a",{href:"#restaurant",className:"rest-link"},"🏪 Ресторан")
    )
  );
  wrap.appendChild(header);

  const main=h("div",{className:"main"});

  if(s.tab==="dashboard"){
    main.appendChild(h("div",{className:"h1"},"Текущая смена"));
    if(newOrders.length>0){
      const alert=h("div",{className:"alert-new",onClick:()=>A.setTab("orders")},
        h("span",{},"🔔"),
        h("div",{style:{flex:"1"}},
          h("div",{style:{fontSize:"15px",fontWeight:"900"}},"Новых заказов: "+newOrders.length),
          h("div",{style:{fontSize:"12px",color:"rgba(0,0,0,.5)",marginTop:"2px"}},"Нажмите чтобы принять")
        ),
        h("span",{style:{fontSize:"18px",fontWeight:"900"}},"→")
      );
      main.appendChild(alert);
    }
    // Stats
    const statsGrid=h("div",{className:"stats"});
    [{label:"Ресторанов",value:`${activeRests.length}/10`,icon:"🏪"},{label:"Курьеров",value:`${s.couriers.filter(c=>c.status!=="free").length}/${s.couriers.length}`,icon:"🛵"},
     {label:"Активных заказов",value:activeOrders.length,icon:"📦"},{label:"Доставлено",value:s.orders.filter(o=>o.status==="done").length,icon:"✅"}]
    .forEach(st=>{
      statsGrid.appendChild(h("div",{className:"stat-card"},h("div",{className:"stat-icon"},st.icon),h("div",{className:"stat-val"},String(st.value)),h("div",{className:"stat-label"},st.label)));
    });
    main.appendChild(statsGrid);

    main.appendChild(h("div",{className:"h2"},"Курьеры"));
    s.couriers.forEach(c=>{
      const sc=STATUSES[c.status];
      const aR=c.assignments.map(a=>s.restaurants.find(r=>r.id===a.restId)).filter(Boolean);
      const cO=activeOrders.filter(o=>o.courierId===c.id);
      const card=h("div",{className:"card"},
        h("div",{className:"flex"},
          h("div",{className:"courier-avatar"},c.avatar),
          h("div",{style:{flex:"1"}},h("div",{style:{fontSize:"16px",fontWeight:"900"}},c.name),c.phone?h("div",{style:{fontSize:"12px",color:MUTED}},c.phone):null),
          h("span",{className:"tag",style:{background:sc.color}},sc.label),
          h("button",{className:"btn",style:{fontSize:"12px",padding:"6px 12px"},onClick:()=>A.openModal("assign",{courierId:c.id})},"+ Ресторан")
        )
      );
      const tags=h("div",{className:"flex-wrap"});
      aR.forEach(r=>{
        const ass=c.assignments.find(a=>a.restId===r.id);
        const t=h("span",{className:"rest-tag",style:{background:r.color+"18",border:`1.5px solid ${r.color}`,color:r.color}},
          h("span",{style:{width:"7px",height:"7px",borderRadius:"50%",background:r.color,display:"inline-block"}}),
          r.name," ",h("span",{style:{fontSize:"10px",color:MUTED}},"с "+ass?.since),
          " ",
          h("span",{style:{cursor:"pointer",color:MUTED,marginLeft:"2px"},onClick:()=>A.toggleAssign(c.id,r.id)},"×")
        );
        tags.appendChild(t);
      });
      cO.forEach(o=>{
        const t=h("span",{className:"rest-tag",style:{background:"#fff8e1",border:`1.5px solid ${Y}`,color:TEXT,cursor:"pointer"},onClick:()=>A.setTab("orders")},
          "📦 ",o.clientAddress.slice(0,16)+(o.clientAddress.length>16?"…":"")
        );
        tags.appendChild(t);
      });
      if(aR.length===0&&cO.length===0)tags.appendChild(h("span",{style:{fontSize:"12px",color:MUTED}},"Ничего не назначено"));
      card.appendChild(tags);
      main.appendChild(card);
    });
  }

  else if(s.tab==="orders"){
    const row=h("div",{className:"flex",style:{justifyContent:"space-between",marginBottom:"16px"}},
      h("div",{},h("div",{className:"h1",style:{marginBottom:"2px"}},"Заказы"),h("div",{style:{fontSize:"12px",color:MUTED,fontWeight:"600"}},`${activeOrders.length} активных · ${s.orders.filter(o=>o.status==="done").length} доставлено`)),
      h("button",{className:"btn",onClick:()=>A.openModal("addOrder",{})},"+ Новый заказ")
    );
    main.appendChild(row);
    if(s.orders.length===0){main.appendChild(h("div",{className:"empty"},h("div",{className:"empty-icon"},"📦"),h("div",{style:{fontSize:"15px",fontWeight:"700"}},"Заказов пока нет")));return wrap;}
    s.orders.forEach(order=>{
      const rest=s.restaurants.find(r=>r.id===order.restId);
      const courier=s.couriers.find(c=>c.id===order.courierId);
      const st=ORDER_S[order.status];
      const card=h("div",{className:"card",style:{borderColor:order.status==="new"&&order.fromRestaurant?Y:"#F0E8C0",boxShadow:order.status==="new"&&order.fromRestaurant?`3px 3px 0 ${Y}`:"2px 2px 0 #F0E8C0"}});
      if(order.fromRestaurant)card.appendChild(h("div",{className:"from-rest-badge"},"🏪 от ресторана"));
      const topRow=h("div",{className:"flex",style:{alignItems:"flex-start",gap:"12px"}});
      const left=h("div",{style:{flex:"1"}});
      left.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px",flexWrap:"wrap"}},
        h("span",{className:"tag",style:{background:st.color}},st.label),
        h("span",{style:{fontSize:"12px",color:MUTED}},"в "+order.createdAt)
      ));
      left.appendChild(h("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",marginBottom:"6px"}},
        h("div",{},h("div",{style:{fontSize:"10px",color:MUTED,fontWeight:"700",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"4px"}},"Телефон"),
          h("a",{href:"tel:"+order.clientPhone,className:"call-btn"},"📞 "+order.clientPhone)),
        h("div",{},h("div",{style:{fontSize:"10px",color:MUTED,fontWeight:"700",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"4px"}},"Адрес"),
          h("div",{style:{fontSize:"14px",fontWeight:"700"}},"📍 "+order.clientAddress))
      ));
      if(order.note)left.appendChild(h("div",{style:{fontSize:"13px",color:MUTED,fontStyle:"italic",marginBottom:"6px"}},"💬 "+order.note));
      const tags2=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}});
      if(rest)tags2.appendChild(h("span",{className:"tag",style:{background:rest.color}},rest.name));
      if(courier)tags2.appendChild(h("span",{className:"tag tag-yellow"},"🛵 "+courier.name));
      if(!courier&&order.status==="new")tags2.appendChild(h("span",{style:{fontSize:"12px",color:MUTED,fontWeight:"600"}},"⏳ Ждёт курьера"));
      left.appendChild(tags2);
      const right=h("div",{style:{display:"flex",flexDirection:"column",gap:"6px",flexShrink:"0"}});
      right.appendChild(h("button",{className:"btn-sm",onClick:()=>A.openModal("editOrder",{orderId:order.id})},"Изменить"));
      if(order.status!=="done"&&order.status!=="cancelled")right.appendChild(h("button",{className:"btn-sm btn-green",onClick:()=>A.setOrderStatus(order.id,"done")},"✓ Доставлен"));
      right.appendChild(h("button",{className:"btn-sm btn-red",onClick:()=>A.delOrder(order.id)},"Удалить"));
      topRow.appendChild(left);topRow.appendChild(right);
      card.appendChild(topRow);
      const sbar=h("div",{className:"status-bar"});
      Object.entries(ORDER_S).forEach(([key,sv])=>{
        const b=h("button",{className:"status-btn",onClick:()=>A.setOrderStatus(order.id,key)},sv.label);
        if(order.status===key){b.style.borderColor=sv.color;b.style.background=sv.color;b.style.color="#fff";}
        sbar.appendChild(b);
      });
      card.appendChild(sbar);
      main.appendChild(card);
    });
  }

  else if(s.tab==="couriers"){
    const row=h("div",{className:"flex",style:{justifyContent:"space-between",marginBottom:"16px"}},
      h("div",{className:"h1",style:{marginBottom:0}},"Курьеры"),
      h("button",{className:"btn",onClick:()=>A.openModal("addCourier",{})},"+ Добавить")
    );
    main.appendChild(row);
    s.couriers.forEach(c=>{
      const sc=STATUSES[c.status];
      const card=h("div",{className:"card",style:{display:"flex",alignItems:"center",gap:"12px"}},
        h("div",{className:"courier-avatar"},c.avatar),
        h("div",{style:{flex:"1"}},h("div",{style:{fontSize:"15px",fontWeight:"900"}},c.name),c.phone?h("div",{style:{fontSize:"12px",color:MUTED}},c.phone):null),
        h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap"}},
          ...Object.entries(STATUSES).map(([key,sv])=>{
            const b=h("button",{className:"status-btn",onClick:()=>A.setCourierStatus(c.id,key)},sv.label);
            if(c.status===key){b.style.borderColor=sv.color;b.style.background=sv.color;b.style.color="#fff";}
            return b;
          })
        ),
        h("button",{className:"btn-sm btn-red",onClick:()=>A.removeCourier(c.id)},"Удалить")
      );
      main.appendChild(card);
    });
  }

  else if(s.tab==="restaurants"){
    const activeRests2=s.restaurants.filter(r=>r.active);
    const row=h("div",{className:"flex",style:{justifyContent:"space-between",marginBottom:"16px"}},
      h("div",{},h("div",{className:"h1",style:{marginBottom:"2px"}},"Рестораны"),h("div",{style:{fontSize:"12px",color:MUTED,fontWeight:"600"}},`${activeRests2.length}/10`)),
      h("button",{className:"btn",disabled:activeRests2.length>=10,onClick:()=>A.openModal("addRest",{})},"+ Добавить")
    );
    main.appendChild(row);
    activeRests2.forEach(r=>{
      const couriersHere=s.couriers.filter(c=>c.assignments.find(a=>a.restId===r.id));
      const card=h("div",{className:"card",style:{display:"flex",alignItems:"center",gap:"12px",borderColor:r.color+"44"}},
        h("div",{className:"rest-dot",style:{background:r.color}}),
        h("div",{style:{flex:"1"}},
          h("div",{style:{fontSize:"15px",fontWeight:"900"}},r.name),
          (r.cuisine||r.address||r.phone)?h("div",{style:{fontSize:"12px",color:MUTED,marginTop:"2px"}},[r.cuisine,r.address?"📍 "+r.address:"",r.phone?"📞 "+r.phone:""].filter(Boolean).join(" · ")):null
        ),
        h("div",{style:{display:"flex",gap:"6px"}},
          ...couriersHere.map(c=>h("span",{className:"tag tag-yellow"},c.name))
        ),
        h("button",{className:"btn-sm",style:{marginRight:"6px"},onClick:()=>A.openModal("editRest",{rest:{...r}})},"Изменить"),
        h("button",{className:"btn-sm btn-red",onClick:()=>A.removeRest(r.id)},"Удалить")
      );
      main.appendChild(card);
    });
  }

  wrap.appendChild(main);
  return wrap;
}

// ── MODALS ─────────────────────────────────────────────────────────────────
function renderModal(){
  const {type,data}=state.modal;
  const s=state;
  const activeRests=s.restaurants.filter(r=>r.active);

  const overlay=h("div",{className:"overlay",onClick:e=>{if(e.target===overlay)A.closeModal();}});
  const modal=h("div",{className:"modal"});
  overlay.appendChild(modal);

  function mkHeader(title){
    return h("div",{className:"modal-header"},
      h("div",{className:"modal-title"},title),
      h("button",{className:"modal-close",onClick:A.closeModal},"×")
    );
  }
  function mkField(label,val,onChange,placeholder,type="text"){
    const inp=h("input",{type,placeholder});
    inp.value=val||"";
    inp.addEventListener("input",e=>onChange(e.target.value));
    return h("div",{className:"field"},h("label",{},label),inp);
  }
  function mkSelect(label,val,opts,onChange){
    const sel=h("select",{});
    sel.appendChild(h("option",{value:""},"— Выбрать —"));
    opts.forEach(o=>{const opt=h("option",{value:String(o.v)},o.l);if(String(val)===String(o.v))opt.selected=true;sel.appendChild(opt);});
    sel.addEventListener("change",e=>onChange(e.target.value));
    return h("div",{className:"field"},h("label",{},label),sel);
  }

  if(type==="addOrder"){
    let od={clientPhone:"",clientAddress:"",restId:"",courierId:"",note:""};
    modal.appendChild(mkHeader("Новый заказ"));
    const fields=h("div",{});
    function rebuild(){fields.innerHTML="";
      fields.appendChild(mkField("Телефон клиента *",od.clientPhone,v=>{od.clientPhone=v;},"+995 599 ...","tel"));
      fields.appendChild(mkField("Адрес доставки *",od.clientAddress,v=>{od.clientAddress=v;},"Улица, дом, квартира"));
      fields.appendChild(mkSelect("Ресторан",od.restId,activeRests.map(r=>({v:r.id,l:r.name})),v=>{od.restId=v;}));
      fields.appendChild(mkSelect("Курьер",od.courierId,s.couriers.map(c=>({v:c.id,l:c.name})),v=>{od.courierId=v;}));
      fields.appendChild(mkField("Примечание",od.note,v=>{od.note=v;},"Код домофона, этаж..."));
    }
    rebuild();
    modal.appendChild(fields);
    modal.appendChild(h("button",{className:"btn",style:{width:"100%",marginTop:"8px"},onClick:()=>{
      if(!od.clientPhone.trim()||!od.clientAddress.trim())return;
      A.addOrder({clientPhone:od.clientPhone,clientAddress:od.clientAddress,restId:od.restId?Number(od.restId):null,courierId:od.courierId?Number(od.courierId):null,note:od.note,fromRestaurant:false});
      A.closeModal();flash("Заказ добавлен ✓");
    }},"Добавить заказ"));
  }

  else if(type==="editOrder"){
    const order=s.orders.find(o=>o.id===data.orderId);
    if(!order){A.closeModal();return overlay;}
    modal.appendChild(mkHeader("Редактировать заказ"));
    modal.appendChild(mkField("Телефон",order.clientPhone,v=>A.updOrder(order.id,"clientPhone",v),"+995 ...","tel"));
    modal.appendChild(mkField("Адрес",order.clientAddress,v=>A.updOrder(order.id,"clientAddress",v),"Адрес"));
    modal.appendChild(mkSelect("Ресторан",order.restId,activeRests.map(r=>({v:r.id,l:r.name})),v=>A.updOrder(order.id,"restId",v?Number(v):null)));
    modal.appendChild(mkSelect("Курьер",order.courierId,s.couriers.map(c=>({v:c.id,l:c.name})),v=>A.updOrder(order.id,"courierId",v?Number(v):null)));
    modal.appendChild(mkField("Примечание",order.note,v=>A.updOrder(order.id,"note",v),"Примечание"));
    modal.appendChild(h("button",{className:"btn",style:{width:"100%",marginTop:"8px"},onClick:A.closeModal},"Сохранить"));
  }

  else if(type==="addRest"){
    let rd={name:"",cuisine:"",address:"",phone:""};
    modal.appendChild(mkHeader("Новый ресторан"));
    modal.appendChild(mkField("Название *",rd.name,v=>{rd.name=v;},"Название"));
    modal.appendChild(mkField("Телефон",rd.phone,v=>{rd.phone=v;},"+995 599 ...","tel"));
    modal.appendChild(mkField("Адрес",rd.address,v=>{rd.address=v;},"Адрес"));
    modal.appendChild(mkField("Кухня",rd.cuisine,v=>{rd.cuisine=v;},"Грузинская..."));
    modal.appendChild(h("button",{className:"btn",style:{width:"100%",marginTop:"8px"},onClick:()=>{
      if(!rd.name.trim())return;A.addRest(rd);A.closeModal();flash("Ресторан добавлен ✓");
    }},"Добавить"));
  }

  else if(type==="editRest"){
    let r={...data.rest};
    modal.appendChild(mkHeader("Редактировать ресторан"));
    modal.appendChild(mkField("Название",r.name,v=>{r.name=v;},"Название"));
    modal.appendChild(mkField("Телефон",r.phone,v=>{r.phone=v;},"+995 599 ...","tel"));
    modal.appendChild(mkField("Адрес",r.address,v=>{r.address=v;},"Адрес"));
    modal.appendChild(mkField("Кухня",r.cuisine,v=>{r.cuisine=v;},"Грузинская..."));
    modal.appendChild(h("button",{className:"btn",style:{width:"100%",marginTop:"8px"},onClick:()=>{
      A.updateRest(r.id,{name:r.name,phone:r.phone,address:r.address,cuisine:r.cuisine});A.closeModal();flash("Ресторан обновлён ✓");
    }},"Сохранить"));
  }

  else if(type==="addCourier"){
    let cd={name:"",phone:""};
    modal.appendChild(mkHeader("Новый курьер"));
    modal.appendChild(mkField("Имя *",cd.name,v=>{cd.name=v;},"Имя"));
    modal.appendChild(mkField("Телефон",cd.phone,v=>{cd.phone=v;},"+995 599 ...","tel"));
    modal.appendChild(h("button",{className:"btn",style:{width:"100%",marginTop:"8px"},onClick:()=>{
      if(!cd.name.trim())return;A.addCourier(cd);A.closeModal();flash("Курьер добавлен ✓");
    }},"Добавить"));
  }

  else if(type==="assign"){
    const courier=s.couriers.find(c=>c.id===data.courierId);
    modal.appendChild(mkHeader("Назначить рестораны"));
    activeRests.forEach(r=>{
      const assigned=courier?.assignments.find(a=>a.restId===r.id);
      const btn=h("button",{className:"assign-btn",style:{borderColor:assigned?r.color:"#F0E8C0",background:assigned?r.color+"18":"transparent"},onClick:()=>{A.toggleAssign(data.courierId,r.id);A.closeModal();A.openModal("assign",{courierId:data.courierId});}},
        h("span",{style:{width:"9px",height:"9px",borderRadius:"50%",background:r.color,display:"inline-block",flexShrink:"0"}}),
        h("span",{style:{flex:"1",color:TEXT}},r.name),
        assigned?h("span",{style:{color:r.color}},"✓"):null
      );
      modal.appendChild(btn);
    });
  }

  return overlay;
}

// ── RESTAURANT MODE ────────────────────────────────────────────────────────
function renderRestaurantMode(){
  const s=state;
  const activeRests=s.restaurants.filter(r=>r.active);
  const wrap=h("div",{});

  const header=h("div",{className:"header"},
    h("div",{className:"logo"},
      h("div",{className:"logo-icon"},"B"),
      h("div",{},h("div",{className:"logo-title"},"Balance"),h("div",{className:"logo-sub"},"Панель ресторана"))
    ),
    h("a",{href:"#courier",className:"rest-link"},"🛵 Курьер")
  );
  wrap.appendChild(header);

  const main=h("div",{className:"main",style:{maxWidth:"500px"}});

  if(s.sent){
    main.appendChild(h("div",{style:{textAlign:"center",padding:"60px 0"}},
      h("div",{style:{fontSize:"64px",marginBottom:"16px"}},"✅"),
      h("div",{style:{fontSize:"22px",fontWeight:"900"}},"Заказ отправлен!"),
      h("div",{style:{fontSize:"14px",color:MUTED,marginTop:"8px",fontWeight:"600"}},"Курьер уже видит его в приложении")
    ));
    wrap.appendChild(main);return wrap;
  }

  main.appendChild(h("div",{},h("div",{className:"h1",style:{marginBottom:"4px"}},"Новый заказ"),h("div",{style:{fontSize:"13px",color:MUTED,fontWeight:"600",marginBottom:"20px"}},"Выберите ресторан и заполните данные клиента")));
  main.appendChild(h("div",{className:"h2"},"Ваш ресторан"));

  activeRests.forEach(r=>{
    const sel=s.selRest&&s.selRest.id===r.id;
    const btn=h("button",{className:"rest-select-btn"+(sel?" selected":""),style:{"--rc":r.color,borderColor:sel?r.color:"#F0E8C0",background:sel?r.color+"15":"#fff",boxShadow:sel?`2px 2px 0 ${r.color}`:"2px 2px 0 #F0E8C0"},onClick:()=>setState({selRest:r})},
      h("span",{style:{width:"10px",height:"10px",borderRadius:"50%",background:r.color,display:"inline-block",flexShrink:"0"}}),
      h("span",{style:{flex:"1"}},r.name),
      sel?h("span",{style:{color:r.color,fontWeight:"900"}},"✓"):null
    );
    main.appendChild(btn);
  });

  if(s.selRest){
    main.appendChild(h("div",{className:"divider"}));
    main.appendChild(h("div",{className:"h2"},"Данные клиента"));

    function rField(label,key,ph,type="text"){
      const inp=h("input",{type,placeholder:ph,style:{width:"100%",padding:"13px 14px",borderRadius:"10px",background:"#FFFDF0",border:"2px solid #F0E8C0",color:TEXT,fontSize:"15px",outline:"none",fontWeight:"600"}});
      inp.value=s.restForm[key]||"";
      inp.addEventListener("input",e=>{const f={...s.restForm};f[key]=e.target.value;setState({restForm:f});});
      main.appendChild(h("div",{className:"field",style:{marginBottom:"14px"}},h("label",{},label),inp));
    }
    rField("Телефон клиента *","clientPhone","+995 599 ...","tel");
    rField("Адрес доставки *","clientAddress","Улица, дом, квартира");
    rField("Примечание","note","Код домофона, этаж, ориентир...");

    const f=s.restForm;
    const disabled=!f.clientPhone.trim()||!f.clientAddress.trim();
    const submitBtn=h("button",{className:"big-btn",disabled,onClick:()=>{
      if(disabled)return;
      const o={id:gid(),clientPhone:f.clientPhone,clientAddress:f.clientAddress,note:f.note,restId:s.selRest.id,courierId:null,status:"new",createdAt:tnow(),fromRestaurant:true};
      const orders=[o,...s.orders];
      save("bal_orders",orders);
      setState({orders,sent:true,restForm:{clientPhone:"",clientAddress:"",note:""},selRest:null});
      setTimeout(()=>setState({sent:false}),3000);
    }},"📦 Отправить заказ курьеру");
    main.appendChild(submitBtn);
  }

  wrap.appendChild(main);
  if(s.flash){const f=document.createElement("div");f.className="flash";f.textContent=s.flash;wrap.appendChild(f);}
  return wrap;
}

render();
</script>
